# Overrides para correr ms-clientes localmente (ej. desde IntelliJ), reutilizando
# el mysql-db y el eureka-server que siguen corriendo en Docker Compose.
# Activar con: -Dspring.profiles.active=local (o env SPRING_PROFILES_ACTIVE=local)
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/db_clientes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
