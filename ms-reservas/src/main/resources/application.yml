spring:
  application:
    name: ms-reservas
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Valores por defecto usados solo si el Config Server no responde
server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
